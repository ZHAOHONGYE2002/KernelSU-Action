name: Build kernel

env:
  ###################################
  # ★ 小米8 dipper — MIUI 底包示例 #
  ###################################
  kernel_repository: MiCode/Xiaomi_Kernel_OpenSource
  kernel_branch: dipper-q-oss
  device: dipper
  defconfig: dipper_defconfig

on:
  workflow_dispatch:
    inputs:
      allow_rebuild:
        description: "Allow Rebuild"
        type: boolean
        default: false

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc \
          bison \
          flex \
          libssl-dev \
          make \
          gcc \
          clang \
          patch \
          git \
          wget \
          zip

    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone kernel source
      run: |
        git clone --depth=1 --branch=${{ env.kernel_branch }} https://github.com/${{ env.kernel_repository }}.git kernel

    # ===== 打补丁（直接写死，不用变量）=====
    - name: Apply patches
      working-directory: kernel
      run: |
        echo "Applying backport-path-umount.patch"
        patch -p1 < ../backport-path-umount.patch || true

        echo "Applying 50_add_susfs_in_kernel-4.9.patch"
        patch -p1 < ../50_add_susfs_in_kernel-4.9.patch || true

    # ===== 强制开启 KSU & SUSFS =====
    - name: Enable KSU & SUSFS in defconfig
      working-directory: kernel
      run: |
        DEF=arch/arm64/configs/${{ env.defconfig }}
        echo "CONFIG_KSU=y" >> $DEF
        echo "CONFIG_KSU_SUSFS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEF

    # ===== 修复 4.9 内核 dtc 冲突 =====
    - name: Fix dtc yylloc conflict
      working-directory: kernel
      run: |
        rm -f scripts/dtc/dtc-lexer.lex.c
        rm -f scripts/dtc/dtc-parser.tab.c
        rm -f scripts/dtc/dtc-parser.tab.h

    # ===== 安装 KernelSU =====
    - name: Setup KernelSU
      working-directory: kernel
      run: |
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    # ===== 编译 =====
    - name: Build kernel
      working-directory: kernel
      run: |
        make clean
        make mrproper
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang ${{ env.defconfig }}
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang -j$(nproc --all)

    # ===== 打包 =====
    - name: Package boot image
      working-directory: kernel
      run: |
        cp arch/arm64/boot/Image.gz-dtb .
        zip -r boot-dipper-KSU-SUSFS.zip Image.gz-dtb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: boot-dipper-KSU-SUSFS
        path: kernel/boot-dipper-KSU-SUSFS.zip
