name: Build kernel

env:
  ###################################
  # ★ 小米8 dipper — MIUI 底包示例 #
  ###################################
  kernel_repository: MiCode/Xiaomi_Kernel_OpenSource
  kernel_branch: dipper-q-oss
  device: dipper
  defconfig: |
    dipper_defconfig
  kernel_patch: |
    backport-path-umount.patch
    50_add_susfs_in_kernel-4.9.patch
  kernelsu_patch: |

on:
  workflow_dispatch:
    inputs:
      allow_rebuild:
        description: "Allow Rebuild"
        type: boolean
        default: false

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y \
          bc \
          bison \
          flex \
          libssl-dev \
          make \
          gcc \
          clang \
          llvm \
          lld \
          binutils-aarch64-linux-gnu \
          binutils-arm-linux-gnueabi

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: ${{ env.kernel_repository }}
        ref: ${{ env.kernel_branch }}
        submodules: recursive

    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        path: this-repo
        submodules: recursive

    # ===== 打补丁 =====
    - name: Apply kernel patches
      run: |
        for p in $kernel_patch; do
          echo "Applying patch: $p"
          patch -p1 --forward < this-repo/patches/$p || true
        done

    # ===== 强制开启 KSU & SUSFS =====
    - name: Enable KSU & SUSFS in defconfig
      run: |
        DEF=arch/arm64/configs/dipper_defconfig
        echo "CONFIG_KSU=y" >> $DEF
        echo "CONFIG_KSU_SUSFS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEF

    - name: Merge defconfig
      run: |
        > arch/arm64/configs/merged_defconfig
        while read -r line; do
          if [ -z "$line" ] || [[ "$line" == "#"* ]]; then continue; fi
          echo "Merging defconfig: $line"
          cat arch/arm64/configs/$line >> arch/arm64/configs/merged_defconfig
        done <<<"$defconfig"

    # ===== 安装 KernelSU (非GKI) =====
    - name: Setup KernelSU
      run: |
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    # ===== 导出编译参数 =====
    - name: Export build flags
      run: |
        echo "FLAGS=ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang" >> $GITHUB_ENV

    # ===== 生成配置 =====
    - name: Make defconfig
      run: |
        make O=out $FLAGS merged_defconfig

    # ===== 开始编译 =====
    - name: Make
      run: |
        make O=out $FLAGS -j$(nproc --all)

    # ===== 打包 =====
    - name: Package AnyKernel3
      run: |
        cp out/arch/arm64/boot/Image.gz-dtb .
        zip -r boot-dipper-KSU-SUSFS.zip Image.gz-dtb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: boot-dipper-KSU-SUSFS
        path: boot-dipper-KSU-SUSFS.zip
