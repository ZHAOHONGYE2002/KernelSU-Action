name: Build kernel

env:
  ###################################
  # ★ 小米8 dipper — MIUI 底包示例 #
  ###################################
  kernel_repository: MiCode/Xiaomi_Kernel_OpenSource
  kernel_branch: dipper-q-oss
  device: dipper
  defconfig: |
    dipper_defconfig
  kernel_patch: |
    backport-path-umount.patch
    50_add_susfs_in_kernel-4.9.patch
  kernelsu_patch: |

on:
  workflow_dispatch:
    inputs:
      allow_rebuild:
        description: "Allow Rebuild"
        type: boolean
        default: false

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc \
          bison \
          flex \
          libssl-dev \
          make \
          gcc \
          clang \
          lld \
          git \
          python3

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: ${{ env.kernel_repository }}
        ref: ${{ env.kernel_branch }}
        path: kernel

    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        path: this-repo

    # ===== 打补丁 =====
    - name: Apply patches
      run: |
        cd kernel
        for p in ${{ env.kernel_patch }}; do
          echo "Applying $p"
          patch -p1 --forward < ../this-repo/patches/$p || true
        done

    # ===== 强制开启 KSU & SUSFS =====
    - name: Enable KSU & SUSFS in defconfig
      run: |
        cd kernel
        DEF=arch/arm64/configs/dipper_defconfig
        echo "CONFIG_KSU=y" >> $DEF
        echo "CONFIG_KSU_SUSFS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEF

    # ===== 安装 KernelSU (非GKI) =====
    - name: Setup KernelSU
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

    # ===== 修复 4.9 内核在 Ubuntu 上的编译错误 =====
    - name: Fix bison/flex compatibility for old kernels
      run: |
        cd kernel
        # 删除自动生成的 lexer/parser 文件，强制使用系统工具重新生成
        rm -f scripts/dtc/dtc-lexer.lex.c
        rm -f scripts/dtc/dtc-parser.tab.c
        rm -f scripts/dtc/dtc-parser.tab.h

    # ===== 编译 =====
    - name: Build kernel
      run: |
        cd kernel
        # 清理
        make clean
        make mrproper
        
        # 配置
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang $DEF
        
        # 编译
        make ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang -j$(nproc --all)

    # ===== 打包 =====
    - name: Package AnyKernel3
      run: |
        cd kernel
        cp arch/arm64/boot/Image.gz-dtb .
        zip -r boot-dipper-KSU-SUSFS.zip Image.gz-dtb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: boot-dipper-KSU-SUSFS
        path: kernel/boot-dipper-KSU-SUSFS.zip
