name: Build kernel

env:
  ###################################
  # ★ 小米8 dipper — MIUI 底包示例 #
  ###################################
  kernel_repository: MiCode/Xiaomi_Kernel_OpenSource
  kernel_branch: dipper-q-oss
  device: dipper
  defconfig: dipper_defconfig

on:
  workflow_dispatch:
    inputs:
      allow_rebuild:
        description: "Allow Rebuild"
        type: boolean
        default: false

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc \
          bison \
          flex \
          libssl-dev \
          make \
          gcc \
          clang \
          patch \
          git 
        # 修复 4.9 内核的 yylloc 冲突
        sudo ln -s /usr/bin/bison.yy /usr/bin/bison
        sudo ln -s /usr/bin/flex.yy /usr/bin/flex

    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Checkout kernel source
      run: |
        git clone --depth=1 -b $kernel_branch https://github.com/$kernel_repository.git kernel
        cd kernel
        echo "Kernel source cloned successfully."

    - name: Apply patches
      run: |
        cd kernel
        # 应用内核补丁
        for patch in ../*.patch; do
          if [ -f "$patch" ]; then
            echo "Applying patch: $patch"
            patch -p1 < "$patch"
          fi
        done

    - name: Enable KSU & SUSFS in defconfig
      run: |
        cd kernel
        make $defconfig
        # 启用 KernelSU 和 SUSFS
        scripts/kconfig/merge_config.sh arch/arm64/configs/$defconfig \
          kernel/crypto/Kconfig \
          kernel/fs/Kconfig \
          kernel/sched/Kconfig \
          kernel/time/Kconfig \
          kernel/trace/Kconfig \
          kernel/uid/Kconfig \
          kernel/user/Kconfig \
          kernel/vfs/Kconfig \
          kernel/workqueue/Kconfig \
          kernel/xxhash/Kconfig \
          kernel/yama/Kconfig \
          kernel/yes/Kconfig \
          kernel/zlib/Kconfig \
          arch/arm64/configs/dipper_defconfig \
          arch/arm64/configs/dipper_miui_defconfig \
          arch/arm64/configs/dipper_q_oss_defconfig
        # 手动启用 KernelSU 和 SUSFS
        ./scripts/config --file .config \
          --enable KERNELSU \
          --enable SUSFS \
          --enable SUSFS_MAGIC_ANON \
          --enable SUSFS_MAGIC_FILE \
          --enable SUSFS_MAGIC_MOUNT \
          --enable SUSFS_MAGIC_SYMLINK \
          --enable SUSFS_OPS_BYPASS \
          --enable SUSFS_BASED_SUPER_BLOCK \
          --enable SUSFS_SUPER_BLOCK \
          --enable SUSFS_SUPER_BLOCK_OPS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
          --enable SUSFS_SUPER_BLOCK_OPS_BYPASS \
